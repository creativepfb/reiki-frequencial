<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #04050f;
    --bg2: #080b1a;
    --bg3: #0c1028;
    --gold: #c9a84c;
    --gold2: #f0d080;
    --purple: #7b4fc9;
    --violet: #a855f7;
    --teal: #00d4aa;
    --text: #e8e0f0;
    --muted: #8878a0;
    --card-bg: rgba(15,12,35,0.85);
    --card-border: rgba(120,80,200,0.25);

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Raleway', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Stars background */
  body::before {
    content:'';
    position:fixed; inset:0; z-index:0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(123,79,201,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(0,212,170,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.06) 0%, transparent 40%);
    pointer-events:none;
  }

  .stars {
    position:fixed; inset:0; z-index:0; pointer-events:none;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 40%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 40% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 25%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 70%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 80%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 10%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 33% 55%, rgba(200,180,255,0.5) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 67% 45%, rgba(180,220,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 48% 85%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 78% 50%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 5% 50%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 95% 35%, rgba(255,255,255,0.4) 0%, transparent 100%),

    max-width: 900px;
    margin: 0 auto;
    padding: 0 20px 60px;
  }

    padding: 50px 20px 30px;
    position:relative;
  }

  .header-glow {
    position:absolute; top:0; left:50%; transform:translateX(-50%);
    width:300px; height:200px;
    background: radial-gradient(ellipse, rgba(123,79,201,0.3) 0%, transparent 70%);
    pointer-events:none;
  }

  .mandala-ring {
    width: 90px; height: 90px;
    margin: 0 auto 16px;
    border-radius:50%;
    border: 1.5px solid var(--gold);
    display:flex; align-items:center; justify-content:center;
    position:relative;
    animation: spin 20s linear infinite;
  }
  .mandala-ring::before {
    content:'';
    position:absolute; inset:6px;
    border-radius:50%;
    border: 1px solid rgba(201,168,76,0.4);
  }
  .mandala-ring::after {
    content:'☯';
    font-size:32px;
    color: var(--gold);
    animation: spin 20s linear infinite reverse;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  h1 {
    font-family:'Cinzel', serif;
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    font-weight:600;
    color: var(--gold2);
    letter-spacing:0.08em;
    line-height:1.3;
    text-shadow: 0 0 30px rgba(201,168,76,0.4);
  }

  .subtitle {
    font-size:0.8rem;
    color: var(--muted);
    letter-spacing:0.25em;
    text-transform:uppercase;
    margin-top:8px;
  }

  .divider {
    width:120px; height:1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 20px auto;
  }

  /* Search */
  .search-wrap {
    margin: 0 auto 30px;
    max-width: 500px;
    position:relative;
  }
  .search-wrap input {
    width:100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--card-border);
    border-radius: 40px;
    padding: 12px 20px 12px 46px;
    color: var(--text);
    font-family:'Raleway', sans-serif;
    font-size:0.95rem;
    outline:none;
    transition: border-color 0.3s;
  }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-wrap input:focus { border-color: rgba(168,85,247,0.6); }
  .search-icon {
    position:absolute; left:16px; top:50%; transform:translateY(-50%);
    color:var(--muted); font-size:1.1rem; pointer-events:none;
  }
  .search-hint {
    text-align:center;
    font-size:0.75rem;
    color:var(--muted);
    margin-top:8px;
    letter-spacing:0.05em;
  }

  /* Tabs */
  .tabs {
    display:flex; gap:8px;
    justify-content:center;
    margin-bottom:28px;
  }
  .tab {
    padding:7px 20px;
    border-radius:30px;
    border:1px solid var(--card-border);
    background:transparent;
    color:var(--muted);
    font-family:'Raleway',sans-serif;
    font-size:0.8rem;
    letter-spacing:0.08em;
    cursor:pointer;
    transition: all 0.3s;
  }
  .tab.active {
    background: rgba(123,79,201,0.25);
    border-color: rgba(168,85,247,0.5);
    color: var(--text);
  }
  .tab:hover:not(.active) { border-color:rgba(168,85,247,0.3); color:var(--text); }

  .playlist-bar {
    background: rgba(123,79,201,0.12);
    border:1px solid rgba(168,85,247,0.2);
    border-radius:12px;
    padding:14px 20px;
    margin-bottom:24px;
    display:flex;
    align-items:center;
    gap:16px;
    display:none;

  .playlist-bar-info { flex:1; }
  .playlist-bar-label { font-size:0.7rem; color:var(--muted); letter-spacing:0.1em; text-transform:uppercase; }

  .playlist-bar-sub { font-size:0.75rem; color:var(--muted); margin-top:2px; }

    grid-template-columns: repeat(auto-fill, minmax(260px,1fr));

    border-radius:16px;
    padding:20px;
    cursor:pointer;
    transition: all 0.3s;
    position:relative;
    overflow:hidden;
    backdrop-filter: blur(10px);
  }
  .card::before {
    content:'';
    position:absolute; top:0; left:0; right:0; height:2px;
    background: var(--chakra-color, var(--purple));
    opacity:0.7;
    border-radius:16px 16px 0 0;

    border-color:rgba(168,85,247,0.45);
    transform:translateY(-3px);
    box-shadow:0 8px 30px rgba(123,79,201,0.2);

  .card.active-card {
    border-color: rgba(201,168,76,0.5);
    background: rgba(20,15,50,0.95);
    box-shadow:0 0 30px rgba(201,168,76,0.15);
  }

  .card-header {
    display:flex; align-items:flex-start; gap:12px; margin-bottom:14px;

  .chakra-dot {
    width:10px; height:10px; border-radius:50%;
    background:var(--chakra-color, var(--purple));
    flex-shrink:0; margin-top:5px;
    box-shadow:0 0 8px var(--chakra-color, var(--purple));

  .card-name {

    font-size:0.9rem;
    font-weight:600;
    color:var(--gold2);
    line-height:1.3;

  .card-hz {

    color:var(--muted);
    letter-spacing:0.1em;
    margin-top:2px;

  .card-chakra {
    font-size:0.7rem;
    color:var(--chakra-color, var(--violet));
    letter-spacing:0.08em;
    text-transform:uppercase;
    margin-top:3px;

    display:flex; flex-wrap:wrap; gap:5px;

    font-size:0.68rem;

  }

  .player-area {

    border-top:1px solid rgba(255,255,255,0.06);
    padding-top:14px;
    display:none;
  }
  .player-area.open { display:block; }

  .player-controls {
    display:flex; align-items:center; gap:10px; margin-bottom:10px;
  }
  .btn-play {
    width:38px; height:38px; border-radius:50%;
    background: linear-gradient(135deg, var(--purple), var(--violet));
    border:none; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    font-size:1rem; color:#fff;
    transition:transform 0.2s, box-shadow 0.2s;
    flex-shrink:0;
  }
  .btn-play:hover { transform:scale(1.1); box-shadow:0 0 14px rgba(168,85,247,0.5); }

  .progress-wrap { flex:1; }
  .progress-bar {
    width:100%; height:3px;
    background:rgba(255,255,255,0.1);
    border-radius:3px;
    cursor:pointer;
    position:relative;
    overflow:hidden;
  }
  .progress-fill {
    height:100%;
    background: linear-gradient(90deg, var(--purple), var(--teal));
    border-radius:3px;
    width:0%;
    transition:width 0.5s linear;
  }
  .time-row {
    display:flex; justify-content:space-between;
    font-size:0.65rem; color:var(--muted); margin-top:4px;

  .audio-note {
    font-size:0.7rem; color:var(--muted);
    text-align:center;
    padding:8px;
    background:rgba(255,255,255,0.03);
    border-radius:8px;
    font-style:italic;
  }

  /* Info expanded */

    margin-top:12px;
    display:none;
  }
  .info-expanded.open { display:block; }
  .info-section { margin-bottom:10px; }
  .info-label {
    font-size:0.65rem;
    color:var(--chakra-color, var(--violet));
    text-transform:uppercase;
    letter-spacing:0.15em;
    margin-bottom:5px;
  }
  .info-items {
    display:flex; flex-wrap:wrap; gap:4px;
  }
  .info-item {
    font-size:0.72rem;
    color: rgba(232,224,240,0.8);
    background:rgba(255,255,255,0.04);
    border-radius:6px;
    padding:3px 8px;
  }

  .sistema-badge {
    display:inline-block;
    font-size:0.6rem;
    padding:2px 8px;
    border-radius:20px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    margin-bottom:10px;
  }
  .badge-usui { background:rgba(201,168,76,0.12); color:var(--gold); border:1px solid rgba(201,168,76,0.25); }
  .badge-karuna { background:rgba(0,212,170,0.1); color:var(--teal); border:1px solid rgba(0,212,170,0.2); }

  /* No results */
  .no-results {
    text-align:center; padding:40px 20px;
    color:var(--muted); font-size:0.9rem;
    grid-column: 1/-1;
    display:none;
  }

  /* Footer */
  footer {
    text-align:center;
    padding:30px 20px;
    color:var(--muted);
    font-size:0.7rem;
    letter-spacing:0.1em;
    border-top:1px solid rgba(255,255,255,0.05);
    margin-top:40px;
  }

  .hidden { display:none !important; }
</style>
</head>

      a.estimula.some(x => x.toLowerCase().includes(q)) ||
      a.regiao.some(x => x.toLowerCase().includes(q))
    );
  }
  return list;
}

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['todos','usui','karuna','playlist'][i] === tab);
  });
  if (tab === 'playlist') {
    startPlaylist();
  } else {
    renderGrid();
  }
}

function renderGrid() {
  const list = getFilteredList();
  const grid = document.getElementById('grid');
  const noRes = document.getElementById('noResults');
  grid.innerHTML = '';
  noRes.style.display = list.length === 0 ? 'block' : 'none';

  list.forEach(a => {
    const card = document.createElement('div');
    card.className = 'card' + (playingId === a.id ? ' active-card' : '');
    card.style.setProperty('--chakra-color', a.color);
    card.id = 'card-' + a.id;

    const tags = [...a.atua.slice(0,3), ...a.estimula.slice(0,2)];
    const badgeClass = a.sistema === 'usui' ? 'badge-usui' : 'badge-karuna';
    const badgeText = a.sistema === 'usui' ? 'Reiki Usui' : 'Karuna Ki';

    card.innerHTML = `
      <span class="sistema-badge ${badgeClass}">${badgeText}</span>
      <div class="card-header">
        <div class="chakra-dot"></div>
        <div>
          <div class="card-name">${a.nome}</div>
          <div class="card-hz">${a.hz}</div>
          <div class="card-chakra">${a.chakra}</div>
        </div>
      </div>
      <div class="card-tags">
        ${tags.map(t => `<span class="tag">${t}</span>`).join('')}
      </div>
      <div class="player-area ${playingId === a.id ? 'open' : ''}" id="player-${a.id}">
        <div class="player-controls">
          <button class="btn-play" id="btn-${a.id}" onclick="togglePlay(${a.id}, event)">
            ${playingId === a.id && isPlaying ? '⏸' : '▶'}
          </button>
          <div class="progress-wrap">
            <div class="progress-bar" onclick="seekAudio(event, ${a.id})">
              <div class="progress-fill" id="prog-${a.id}" style="width:0%"></div>
            </div>
            <div class="time-row">
              <span id="cur-${a.id}">0:00</span>
              <span id="dur-${a.id}">--:--</span>
            </div>
          </div>
        </div>
        <div class="audio-note">🎧 Use fones de ouvido para melhor experiência vibracional</div>
        <div class="info-expanded open" id="info-${a.id}">
          <div class="info-section">
            <div class="info-label">Atua em</div>
            <div class="info-items">${a.atua.map(x=>`<span class="info-item">${x}</span>`).join('')}</div>
          </div>
          <div class="info-section">
            <div class="info-label">Pode estimular</div>
            <div class="info-items">${a.estimula.map(x=>`<span class="info-item">${x}</span>`).join('')}</div>
          </div>
          <div class="info-section">
            <div class="info-label">Região</div>
            <div class="info-items">${a.regiao.map(x=>`<span class="info-item">${x}</span>`).join('')}</div>
          </div>
        </div>
      </div>
      ${playingId !== a.id ? `<div style="text-align:center;margin-top:4px"><button onclick="openCard(${a.id},event)" style="background:none;border:none;color:var(--muted);font-size:0.75rem;cursor:pointer;font-family:Raleway,sans-serif;letter-spacing:0.05em">▶ tocar este áudio</button></div>` : ''}
    `;
    grid.appendChild(card);
  });
}

function openCard(id, e) {
  if (e) e.stopPropagation();
  loadAudio(id);
}

function loadAudio(id) {
  const a = audios.find(x => x.id === id);
  if (!a) return;
  playingId = id;
  playlistMode = false;
  audioEl.src = BASE_URL + encodeURIComponent(a.arquivo);
  audioEl.play().catch(()=>{});
  isPlaying = true;
  renderGrid();
  updateAudioEvents(id);
  // scroll to card
  setTimeout(()=>{
    const el = document.getElementById('card-'+id);
    if(el) el.scrollIntoView({behavior:'smooth', block:'center'});
  }, 100);
}

function togglePlay(id, e) {
  if (e) e.stopPropagation();
  if (playingId !== id) { loadAudio(id); return; }
  if (isPlaying) {
    audioEl.pause();
    isPlaying = false;
  } else {
    audioEl.play().catch(()=>{});
    isPlaying = true;
  }
  const btn = document.getElementById('btn-'+id);
  if (btn) btn.textContent = isPlaying ? '⏸' : '▶';
}

function updateAudioEvents(id) {
  audioEl.ontimeupdate = () => {
    const prog = document.getElementById('prog-'+id);
    const cur = document.getElementById('cur-'+id);
    if (!prog || !cur) return;
    const pct = audioEl.duration ? (audioEl.currentTime / audioEl.duration * 100) : 0;
    prog.style.width = pct + '%';
    cur.textContent = fmt(audioEl.currentTime);
    if (playlistMode) {
      document.getElementById('plBarSub').textContent = fmt(audioEl.currentTime) + (audioEl.duration ? ' / ' + fmt(audioEl.duration) : '');
    }
  };
  audioEl.onloadedmetadata = () => {
    const dur = document.getElementById('dur-'+id);
    if (dur) dur.textContent = fmt(audioEl.duration);
  };
  audioEl.onended = () => {
    if (playlistMode) nextPlaylist();
    else { isPlaying = false; const btn = document.getElementById('btn-'+id); if(btn) btn.textContent='▶'; }
  };
}

function seekAudio(e, id) {
  if (playingId !== id || !audioEl.duration) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  audioEl.currentTime = pct * audioEl.duration;
}

function fmt(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s/60), sec = Math.floor(s%60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

// PLAYLIST
function startPlaylist() {
  playlistMode = true;
  playlistIndex = 0;
  const bar = document.getElementById('playlistBar');
  bar.classList.add('visible');
  playlistNext(0);
  renderGrid();
}

function playlistNext(idx) {
  playlistIndex = idx;
  const a = audios[idx];
  if (!a) { stopPlaylist(); return; }
  playingId = a.id;
  audioEl.src = BASE_URL + encodeURIComponent(a.arquivo);
  audioEl.play().catch(()=>{});
  isPlaying = true;
  document.getElementById('plBarTitle').textContent = a.nome + ' — ' + a.hz;
  document.getElementById('plBarSub').textContent = (idx+1) + ' de ' + audios.length;
  document.getElementById('plBarBtn').textContent = '⏸';
  updateAudioEvents(a.id);
  renderGrid();
  setTimeout(()=>{ const el = document.getElementById('card-'+a.id); if(el) el.scrollIntoView({behavior:'smooth',block:'center'}); }, 100);
}

function nextPlaylist() {
  if (playlistIndex < audios.length - 1) playlistNext(playlistIndex + 1);
  else stopPlaylist();
}

function togglePlaylistPlay() {
  if (isPlaying) {
    audioEl.pause(); isPlaying = false;
    document.getElementById('plBarBtn').textContent = '▶';
  } else {
    audioEl.play().catch(()=>{}); isPlaying = true;
    document.getElementById('plBarBtn').textContent = '⏸';
  }
}

function stopPlaylist() {
  playlistMode = false;
  isPlaying = false;
  playingId = null;
  document.getElementById('playlistBar').classList.remove('visible');
  renderGrid();
}

// Search
document.getElementById('searchInput').addEventListener('input', e => {
  currentSearch = e.target.value;
  if (currentTab === 'playlist') { currentTab='todos'; document.querySelectorAll('.tab')[0].classList.add('active'); document.querySelectorAll('.tab')[3].classList.remove('active'); }
  renderGrid();
});

// Init
renderGrid();
</script>
</body>
</html>
